<!DOCTYPE html>
<html>
<head>
    <title>Pirate Llama GUI</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #e0e0e0; 
            font-family: -apple-system, Segoe UI, Roboto, sans-serif; 
            margin: 0; 
            padding: 24px; 
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 { 
            color: #00d4ff; 
            border-bottom: 1px solid #333; 
            padding-bottom: 8px; 
            font-size: 2.5rem;
        }
        .tab { 
            margin: 40px 0; 
        }
        .tab h2 { 
            color: #7c3aed; 
            font-size: 1.8rem;
            margin-bottom: 16px;
        }
        .tab img { 
            width: 100%; 
            border: 1px solid #333; 
            border-radius: 8px; 
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); 
        }
        .meta { 
            color: #888; 
            font-size: 14px; 
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>Project Pirate Llama — Control Center (Dark Theme)</h1>
    <p class="meta">Cyberpunk-inspired HyperSpherical Control Center Mockups.</p>
    
    <div class="tab">
        <h2>Telemetry</h2>
        <a href="dashboard_telemetry.png" target="_blank">
            <img src="dashboard_telemetry.png" alt="Telemetry Dashboard">
        </a>
    </div>

    <div class="tab">
        <h2>Predictor</h2>
        <a href="dashboard_predictor.png" target="_blank">
            <img src="dashboard_predictor.png" alt="Predictor Dashboard">
        </a>
    </div>

    <div class="tab">
        <h2>Compression</h2>
        <a href="dashboard_compression.png" target="_blank">
            <img src="dashboard_compression.png" alt="Compression Dashboard">
        </a>
    </div>

    <div class="tab">
        <h2>Advanced</h2>
        <a href="dashboard_advanced.png" target="_blank">
            <img src="dashboard_advanced.png" alt="Advanced Dashboard">
        </a>
    </div>

</body>
</html>
