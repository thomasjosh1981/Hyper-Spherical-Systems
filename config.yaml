# Project Tesseract Configuration  
# Set by user directive — context compression disabled
  
nvme_io_optimal_chunks:
  optimal_read_chunk: 262144    # 256 KB for NVMe (run nvme_benchmark to calibrate)
  optimal_write_chunk: 524288   # 512 KB for HDD

# Context Compression — explicitly disabled per user directive.
tesseract_context:
  compession_enabled: false      # Disabled — never compress context
  min_comp_phrase_len: 2         # Only used when compession is enabled
  max_dict_entries: 65536        # Keep dictionary small for fast lookup
  max_active_tokens: 260000      # Hard floor — never compress below this threshold

# Memory Management
vr_max_ratio: 0.70               # Never exceed 70% of total VRAM
ram_staging_pct: 0.50            # Up to 50% system RAM for staging
ram_total_bytes: 17179869184     # 16 GB default

# Predictive Prefetch Settings
prediction_window: 16             # How many layers back to watch
prefetch_confidence_min: 0.75    # Only preload if confidence above this threshold
